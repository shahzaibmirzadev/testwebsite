name: Post Sync Retry

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: post-sync-retry-${{ github.ref }}
  cancel-in-progress: false

jobs:
  post-sync-retry:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download latest scrape checkpoint artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: daily-job-sync.yml
          branch: main
          name: daily-sync-checkpoint
          search_artifacts: true
          if_no_artifact_found: fail
          path: .

      - name: Validate apply links (deactivate stale jobs)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/validate-apply-links.mjs

      - name: Refresh jobs master snapshot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/refresh-jobs-master.mjs

      - name: Validate source schema
        run: node scripts/check-source-schema.mjs

      - name: Generate ops health snapshot + alerts
        run: node scripts/ops-health-check.mjs

      - name: Validate live SEO (top jobs)
        run: node scripts/validate-live-seo.mjs

      - name: Commit snapshot updates
        run: |
          git add data/jobs-master.json data/ops-health.json data/seo-validation.json sources.csv source_performance.csv
          if git diff --staged --quiet; then
            echo "No snapshot/source changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Retry post-sync snapshot updates"
          git push
